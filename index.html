<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium static personal portfolio powered by editable JSON content.">
  <meta name="theme-color" content="#080910">
  <title>Your Name | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="loader" id="loader" aria-label="Loading portfolio">
    <div class="loader-mark">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <header class="site-header" id="site-header">
    <nav class="nav-shell" aria-label="Primary navigation">
      <a class="brand" href="#hero" id="brand">Portfolio</a>
      <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <div class="nav-panel" id="nav-panel">
        <a href="#about" data-section="about">About</a>
        <a href="#journey" data-section="journey">Journey</a>
        <a href="#projects" data-section="projects">Projects</a>
        <a href="#achievements" data-section="achievements">Achievements</a>
        <a href="#skills" data-section="skills">Skills</a>
        <a href="#gallery" data-section="gallery">Gallery</a>
        <a href="#resume" data-section="resume">Resume</a>
        <a href="#contact" data-section="contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero" id="hero">
      <canvas class="particle-field" id="particle-field" aria-hidden="true"></canvas>
      <div class="hero-grid container" id="hero-content"></div>
      <a class="scroll-cue" href="#about" aria-label="Scroll to about section">
        <span>Scroll</span>
        <i></i>
      </a>
    </section>

    <section class="section" id="about">
      <div class="container">
        <div class="section-heading reveal">
          <span>01</span>
          <h2>About</h2>
        </div>
        <div id="about-content"></div>
      </div>
    </section>

    <section class="section section-alt" id="journey">
      <div class="container">
        <div class="section-heading reveal">
          <span>02</span>
          <h2>Journey</h2>
        </div>
        <div class="timeline" id="timeline-content"></div>
      </div>
    </section>

    <section class="section" id="projects">
      <div class="container">
        <div class="section-heading reveal">
          <span>03</span>
          <h2>Projects</h2>
        </div>
        <div class="project-toolbar reveal" id="project-toolbar"></div>
        <div class="project-grid" id="project-grid"></div>
      </div>
    </section>

    <section class="section section-alt" id="achievements">
      <div class="container">
        <div class="section-heading reveal">
          <span>04</span>
          <h2>Achievements</h2>
        </div>
        <div class="category-stack" id="achievements-content"></div>
      </div>
    </section>

    <section class="section section-alt" id="skills">
      <div class="container">
        <div class="section-heading reveal">
          <span>05</span>
          <h2>Skills</h2>
        </div>
        <div class="skills-grid" id="skills-content"></div>
      </div>
    </section>

    <section class="section" id="gallery">
      <div class="container">
        <div class="section-heading reveal">
          <span>06</span>
          <h2>Gallery</h2>
        </div>
        <div class="masonry" id="gallery-content"></div>
      </div>
    </section>

    <section class="section section-alt" id="resume">
      <div class="container">
        <div class="section-heading reveal">
          <span>07</span>
          <h2>Resume</h2>
        </div>
        <div id="resume-content"></div>
      </div>
    </section>

    <section class="section" id="contact">
      <div class="container">
        <div class="section-heading reveal">
          <span>08</span>
          <h2>Contact</h2>
        </div>
        <div id="contact-content"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="footer"></footer>

  <div class="modal" id="project-modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-card" id="project-modal-card"></div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <button class="icon-button lightbox-close" id="lightbox-close" type="button" aria-label="Close image viewer">x</button>
    <button class="icon-button lightbox-prev" id="lightbox-prev" type="button" aria-label="Previous image">&lt;</button>
    <div class="lightbox-stage" id="lightbox-stage"></div>
    <button class="icon-button lightbox-next" id="lightbox-next" type="button" aria-label="Next image">&gt;</button>
  </div>

  <script type="module" src="js/site.js"></script>
</body>
</html>
